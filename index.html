<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        canvas{
            border: 1px solid black;
        }
        /* organizar el layout en columnas */
        #main-container {
            display: flex;
            flex-direction: row;
            gap: 20px; /* Espacio entre el canvas y la tabla */
            align-items: flex-start; /* Alinea ambos al tope superior */
            margin-top: 20px;
        }

        /* Contenedor para que la tabla tenga scroll si crece demasiado */
        #table-wrapper {
            max-height: 800px; /* Alineado con la altura de tu canvas */
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <h1>Dibujo de linea con Bresenham</h1>
    
    <div>
       <label>x0: <input type="number" id="x0"></label>
        <label>y0: <input type="number" id="y0"></label>
        <label>x1: <input type="number" id="x1"></label>
        <label>y1: <input type="number" id="y1"></label>
        <button id="drawBtn">Dibujar</button>  
    </div>

    <br>

    <canvas id="canvas" width="800" height="800"></canvas>
    <table id="dataTable" border="1" style="margin-top: 20px; border-collapse: collapse; text-align: center;">
        <thead>
            <tr>
                <th>Paso</th><th>x</th><th>y</th><th>dx</th><th>dy</th><th>sx</th><th>sy</th><th>err</th><th>e2</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>
    <script src="script.js"></script>
</body>
</html>
