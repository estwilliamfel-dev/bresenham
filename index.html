<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bresenham</title>
    <style>
        /* Fondo con gradiente animado */
        body {
            margin: 20px;
            font-family: sans-serif;
            background: linear-gradient(45deg, #ff9a9e, #fecfef, #a1c4fd, #c2e9fb);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        canvas {
            border: 1px solid black;
            background-color: white; /* Para que el fondo animado no se mezcle con el grid */
        }
        
        /* Contenedor principal para organizar el layout en columnas */
        #main-container {
            display: flex;
            flex-direction: row;
            gap: 20px; /* Espacio entre el canvas y la tabla */
            align-items: flex-start; /* Alinea ambos al tope superior */
            margin-top: 20px;
        }

        /* Contenedor para que la tabla tenga scroll si crece demasiado */
        #table-wrapper {
            max-height: 800px; /* Alineado con la altura de tu canvas */
            overflow-y: auto;
            background-color: rgba(255, 255, 255, 0.9); /* Fondo blanco semitransparente */
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }

        table {
            border-collapse: collapse;
            text-align: center;
            width: 100%;
        }

        th, td {
            padding: 8px;
        }
        
        .controls {
            background: rgba(255, 255, 255, 0.8);
            padding: 15px;
            border-radius: 8px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <h1>Dibujo de linea con Bresenham</h1>
    
    <div class="controls">
       <label>x0: <input type="number" id="x0" value="10"></label>
        <label>y0: <input type="number" id="y0" value="10"></label>
        <label>x1: <input type="number" id="x1" value="80"></label>
        <label>y1: <input type="number" id="y1" value="60"></label>
        <button id="drawBtn">Dibujar</button>  
    </div>

    <div id="main-container">
        
        <canvas id="canvas" width="800" height="800"></canvas>
        
        <div id="table-wrapper">
            <table id="dataTable" border="1">
                <thead>
                    <tr>
                        <th>Paso</th><th>x</th><th>y</th><th>dx</th><th>dy</th><th>sx</th><th>sy</th><th>err</th><th>e2</th>
                    </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
        </div>
        
    </div>

    <script src="script.js"></script>
</body>
</html>
